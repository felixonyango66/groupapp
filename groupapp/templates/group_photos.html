<!DOCTYPE html>
<html>
<head>
    <title>Group Photos</title>

    <style>

        body{
            font-family:Arial;
            background:#f4f4f4;
            padding:30px;
        }

        .container{
            width:90%;
            margin:auto;
        }

        .form-box{
            background:white;
            padding:30px;
            border-radius:10px;
            margin-bottom:30px;
        }

        input{
            width:100%;
            padding:12px;
            margin-top:10px;
            margin-bottom:20px;
        }

        button{
            padding:15px 30px;
            background:#1e3a8a;
            color:white;
            border:none;
            cursor:pointer;
        }

        .gallery{
            display:grid;
            grid-template-columns:repeat(auto-fit, minmax(250px,1fr));
            gap:20px;
        }

        .photo-card{
            background:white;
            padding:15px;
            border-radius:10px;
        }

        .photo-card img{
            width:100%;
            height:250px;
            object-fit:cover;
            border-radius:10px;
        }

    </style>

</head>
<body>

    <div class="container">

        <h1>{{ group.group_name }} Photos</h1>

        <div class="form-box">

            <form method="POST" enctype="multipart/form-data">

                {% csrf_token %}

                <input type="text" name="title" placeholder="Photo Title">

                <input type="file" name="image">

                <button type="submit">Upload Photo</button>

            </form>

        </div>

        <div class="gallery">

            {% for photo in photos %}

            <div class="photo-card">

                <img src="{{ photo.image.url }}" alt="">

                <h3>{{ photo.title }}</h3>

            </div>

            {% endfor %}

        </div>

    </div>

</body>
</html>
