<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>

        body{
            background:#f4f4f4;
            font-family:Arial;
        }

        .container{
            width:35%;
            margin:80px auto;
            background:white;
            padding:30px;
            border-radius:10px;
        }

        input{
            width:100%;
            padding:12px;
            margin-top:10px;
            margin-bottom:20px;
        }

        button{
            width:100%;
            padding:15px;
            background:#1e3a8a;
            color:white;
            border:none;
            cursor:pointer;
        }

        .error{
            color:red;
            margin-bottom:20px;
        }

    </style>

</head>
<body>

    <div class="container">

        <h1>Group Login</h1>

        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}

        <form method="POST">

            {% csrf_token %}

            <input type="text" name="group_name" placeholder="Group Name">

            <input type="password" name="password" placeholder="Password">

            <button type="submit">Login</button>

        </form>

    </div>

</body>
</html>
