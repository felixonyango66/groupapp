<!DOCTYPE html>
<html>
<head>
    <title>Visions</title>

    <style>

        body{
            font-family:Arial;
            background:#f4f4f4;
            padding:30px;
        }

        .container{
            width:80%;
            margin:auto;
        }

        .form-box{
            background:white;
            padding:30px;
            border-radius:10px;
            margin-bottom:30px;
        }

        input, textarea{
            width:100%;
            padding:12px;
            margin-top:10px;
            margin-bottom:20px;
        }

        button{
            padding:15px 30px;
            background:#1e3a8a;
            color:white;
            border:none;
            cursor:pointer;
        }

        .vision-card{
            background:white;
            padding:20px;
            margin-bottom:20px;
            border-radius:10px;
        }

    </style>

</head>
<body>

<div class="container">

    <h1>{{ group.group_name }} Vision</h1>

    <div class="form-box">

        <form method="POST">

            {% csrf_token %}

            <input type="text" name="title" placeholder="Vision Title">

            <textarea name="description" placeholder="Vision Description"></textarea>

            <button type="submit">Save Vision</button>

        </form>

    </div>

    {% for vision in visions %}

    <div class="vision-card">

        <h2>{{ vision.title }}</h2>

        <p>{{ vision.description }}</p>

    </div>

    {% endfor %}

</div>

</body>
</html>
