<!DOCTYPE html>
<html>
<head>
    <title>Register Group</title>

    <style>

        body{
            font-family:Arial;
            background:#f4f4f4;
        }

        .container{
            width:40%;
            margin:50px auto;
            background:white;
            padding:30px;
            border-radius:10px;
        }

        input, textarea{
            width:100%;
            padding:12px;
            margin-top:10px;
            margin-bottom:20px;
        }

        button{
            width:100%;
            padding:15px;
            background:#1e3a8a;
            color:white;
            border:none;
            cursor:pointer;
        }

    </style>

</head>
<body>

    <div class="container">

        <h1>Register Group</h1>

        <form method="POST">

            {% csrf_token %}

            <input type="text" name="group_name" placeholder="Group Name">

            <input type="email" name="email" placeholder="Email">

            <input type="text" name="phone" placeholder="Phone Number">

            <input type="text" name="location" placeholder="Location">

            <textarea name="description" placeholder="Description"></textarea>

            <input type="password" name="password" placeholder="Password">

            <button type="submit">Register Group</button>

        </form>

    </div>

</body>
</html>
